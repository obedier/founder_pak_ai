# AiPay Home — Data Model

## Overview

The data model should support:

- user and household context
- preferences and policies
- tasks and recommendations
- merchant offers and orders
- trust progression
- delegated authorization
- post-purchase recovery

Below is a pragmatic v1 domain model.

## Core Entities

## User
Represents an individual user.

Fields:
- user_id
- household_id
- email
- phone
- created_at
- updated_at
- default_priority_mode
- default_payment_method_id
- default_address_id
- onboarding_state

Notes:
- each user belongs to one household in v1
- future versions may support more complex membership models

## Household
Represents the shopping context shared across members.

Fields:
- household_id
- name
- created_at
- updated_at
- default_policy_id

## HouseholdMember
Represents membership and role.

Fields:
- household_member_id
- household_id
- user_id
- role
- can_approve_orders
- can_manage_policies
- can_manage_autopilot

## Address
Represents shipping destinations.

Fields:
- address_id
- household_id
- label
- line1
- line2
- city
- state
- postal_code
- country
- is_default

## PaymentMethodRef
Represents tokenized or referenced payment instruments.

Fields:
- payment_method_id
- household_id
- provider
- last4
- brand
- token_ref
- is_default
- created_at

Important:
- never store raw PAN in this system

## MerchantProfile
Represents a merchant or rail.

Fields:
- merchant_id
- name
- merchant_type
- trust_score
- fulfillment_score
- return_score
- is_enabled
- metadata_json

Examples of merchant_type:
- retailer
- grocery_aggregator
- delivery_rail
- pharmacy

## MerchantPreference
