## Suggested Relationships

- Household has many Users through HouseholdMember
- Household has many Policies
- Household has many ProductPreferences
- Household has many Tasks
- Household has many Orders
- Household has many TrustProfiles
- Task has many Recommendations
- Task may produce one Basket
- Basket has many BasketItems
- Order has many OrderItems
- MerchantProfile has many ProductOffers
- ProductFamily has many ProductOffers

## Modeling Notes

### 1. Trust is category-specific
Trust should not be modeled as a single global number.

### 2. Product family normalization matters
Do not rely only on merchant SKUs. Cross-merchant equivalence is critical for comparison and substitution.

### 3. Policy scope must be flexible
Rules should support:
- global defaults
- category rules
- product-family-specific rules
- merchant-specific rules

### 4. Recommendations should be persisted
Do not treat recommendations as ephemeral UI output. Persist them for auditability, learning, support, and analytics.

### 5. Order recovery state matters
Cancelable and reversible windows must be explicit fields to support user trust and control.

